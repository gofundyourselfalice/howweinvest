# Netlify config for the How We Invest microsite
# Static HTML/CSS, no build step. Netlify serves files from the repo root.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Friendly URLs (people can visit /guide instead of /guide.html, etc.)
[[redirects]]
  from = "/guide"
  to = "/guide.html"
  status = 200

[[redirects]]
  from = "/submit"
  to = "/submit.html"
  status = 200

[[redirects]]
  from = "/hub"
  to = "/hub/index.html"
  status = 200

[[redirects]]
  from = "/hub/videos"
  to = "/hub/videos.html"
  status = 200

[[redirects]]
  from = "/hub/stories"
  to = "/hub/stories.html"
  status = 200

[[redirects]]
  from = "/hub/providers"
  to = "/hub/providers.html"
  status = 200

[[redirects]]
  from = "/hub/glossary"
  to = "/hub/glossary.html"
  status = 200

[[redirects]]
  from = "/hub/questions"
  to = "/hub/questions.html"
  status = 200

# Redirect old chapter URLs (now inside /guide) to the right anchor
